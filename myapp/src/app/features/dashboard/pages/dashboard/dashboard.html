<div>
  @if (auth.user(); as user) {
    <h2 class="text-2xl font-bold text-gray-800 mb-2">Welcome back, {{ user.name }}!</h2>
    <p class="text-gray-600 mb-8">Here's what's happening with your projects today.</p>
  }

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    @for (stat of stats; track stat.label) {
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <p class="text-sm font-medium text-gray-500">{{ stat.label }}</p>
        <div class="mt-2 flex items-baseline gap-2">
          <p class="text-3xl font-bold text-gray-900">{{ stat.value }}</p>
          <span class="text-sm font-medium text-green-600">{{ stat.change }}</span>
        </div>
      </div>
    }
  </div>
</div>

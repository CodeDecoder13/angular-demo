<div class="p-8">
  <h2 class="text-xl font-semibold text-gray-800 mb-6">Sign In</h2>

  @if (error(); as errorMsg) {
    <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">
      {{ errorMsg }}
    </div>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
    <div>
      <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
        placeholder="you@example.com"
      />
      @if (form.controls.email.touched && form.controls.email.errors) {
        <p class="mt-1 text-xs text-red-600">Please enter a valid email address.</p>
      }
    </div>

    <div>
      <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input
        id="password"
        type="password"
        formControlName="password"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
        placeholder="Enter your password"
      />
      @if (form.controls.password.touched && form.controls.password.errors) {
        <p class="mt-1 text-xs text-red-600">Password is required.</p>
      }
    </div>

    <button
      type="submit"
      [disabled]="loading()"
      class="w-full py-2.5 px-4 bg-blue-600 text-white rounded-lg font-medium text-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
    >
      @if (loading()) {
        Signing in...
      } @else {
        Sign In
      }
    </button>
  </form>

  <p class="mt-6 text-center text-sm text-gray-600">
    Don't have an account?
    <a routerLink="/register" class="text-blue-600 hover:text-blue-700 font-medium">Register</a>
  </p>
</div>
